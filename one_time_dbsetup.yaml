# 1. Enable required APIs
gcloud services enable sqladmin.googleapis.com secretmanager.googleapis.com --project=YOUR_PROJECT_ID

# 2. Create Cloud SQL PostgreSQL instance (~5 min)
gcloud sql instances create community-hero-db \
  --database-version=POSTGRES_15 \
  --tier=db-f1-micro \
  --region=asia-south1 \
  --project=YOUR_PROJECT_ID

# 3. Create database and user
gcloud sql databases create community_hero --instance=community-hero-db --project=YOUR_PROJECT_ID
gcloud sql users create community_hero_user \
  --instance=community-hero-db \
  --password=YOUR_STRONG_PASSWORD \
  --project=YOUR_PROJECT_ID

# 4. Store DATABASE_URL in Secret Manager (Unix socket format for Cloud Run)
echo -n "postgresql+psycopg2://community_hero_user:YOUR_STRONG_PASSWORD@/community_hero?host=/cloudsql/YOUR_PROJECT_ID:asia-south1:community-hero-db" | \
  gcloud secrets create DATABASE_URL --data-file=- --project=YOUR_PROJECT_ID

# 5. Grant service account permissions
PROJECT_NUMBER=$(gcloud projects describe YOUR_PROJECT_ID --format='value(projectNumber)')
SA="${PROJECT_NUMBER}-compute@developer.gserviceaccount.com"
gcloud secrets add-iam-policy-binding DATABASE_URL \
  --member="serviceAccount:$SA" --role="roles/secretmanager.secretAccessor" --project=YOUR_PROJECT_ID
gcloud projects add-iam-policy-binding YOUR_PROJECT_ID \
  --member="serviceAccount:$SA" --role="roles/cloudsql.client"
