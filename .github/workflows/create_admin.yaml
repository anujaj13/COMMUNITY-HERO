name: Promote User to Admin - Community Hero

on:
  workflow_dispatch:
    inputs:
      user_identifier:
        description: 'Username or User ID to promote to ADMIN'
        required: true
        type: string

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}
  REGION: asia-south1
  REGISTRY_REGION: asia-south1
  SERVICE_NAME: community-hero
  IMAGE_NAME: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/community-hero/community-hero
  JOB_NAME: promote-admin-user

jobs:
  promote-admin:
    name: Promote User to Admin via Cloud Run Job
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create or Update Cloud Run Job
        run: |
          # Check if job exists
          if gcloud run jobs describe ${{ env.JOB_NAME }} \
            --region ${{ env.REGION }} &>/dev/null; then
            echo "✓ Job exists, updating..."
            gcloud run jobs update ${{ env.JOB_NAME }} \
              --image ${{ env.IMAGE_NAME }}:latest \
              --region ${{ env.REGION }} \
              --command python \
              --args "setup_admin.py,${{ github.event.inputs.user_identifier }}" \
              --set-env-vars "DATABASE_URL=sqlite:///./community_hero.db,LOG_LEVEL=INFO" \
              --memory 512Mi \
              --cpu 1 \
              --task-timeout 300 \
              --max-retries 0
          else
            echo "✓ Creating new job..."
            gcloud run jobs create ${{ env.JOB_NAME }} \
              --image ${{ env.IMAGE_NAME }}:latest \
              --region ${{ env.REGION }} \
              --command python \
              --args "setup_admin.py,${{ github.event.inputs.user_identifier }}" \
              --set-env-vars "DATABASE_URL=sqlite:///./community_hero.db,LOG_LEVEL=INFO" \
              --memory 512Mi \
              --cpu 1 \
              --task-timeout 300 \
              --max-retries 0
          fi

      - name: Execute Cloud Run Job
        id: execute-job
        run: |
          echo "🚀 Executing job to promote user to ADMIN..."
          echo "User Identifier: ${{ github.event.inputs.user_identifier }}"
          echo ""
          
          EXECUTION_NAME=$(gcloud run jobs execute ${{ env.JOB_NAME }} \
            --region ${{ env.REGION }} \
            --format='value(metadata.name)' 2>&1)
          
          echo "execution_name=$EXECUTION_NAME" >> $GITHUB_OUTPUT
          echo "✓ Job execution started: $EXECUTION_NAME"
          echo ""
          echo "⏳ Waiting for job to complete..."
          
          # Wait for job to complete (max 5 minutes)
          for i in {1..30}; do
            sleep 10
            STATUS=$(gcloud run jobs executions describe "$EXECUTION_NAME" \
              --job=${{ env.JOB_NAME }} \
              --region ${{ env.REGION }} \
              --format='value(status.conditions[-1].state)' 2>&1)
            
            if [[ "$STATUS" == "SUCCEEDED" ]] || [[ "$STATUS" == "FAILED" ]]; then
              echo "Job finished with status: $STATUS"
              break
            fi
            echo "Still waiting... (attempt $i/30)"
          done

      - name: Get Job Logs
        if: always()
        run: |
          echo "📋 Job Logs:"
          echo "=========================================="
          
          # Use the execution name from previous step
          EXECUTION_NAME="${{ steps.execute-job.outputs.execution_name }}"
          
          # Get logs using Cloud Logging API
          gcloud logging read \
            "resource.type=cloud_run_job AND resource.labels.job_name=${{ env.JOB_NAME }} AND resource.labels.execution_name=$EXECUTION_NAME" \
            --region ${{ env.REGION }} \
            --limit 50 \
            --format 'value(textPayload)' \
            2>/dev/null || echo "No logs available yet. Check Cloud Logging console."
          
          echo "=========================================="

      - name: Success Summary
        run: |
          echo ""
          echo "✅ User promotion job completed!"
          echo ""
          echo "📝 What happens next:"
          echo "  1. Check the logs above to confirm promotion"
          echo "  2. Go to: https://community-hero-frontend-y4wprv4gea-el.a.run.app/"
          echo "  3. Login with your promoted admin account"
          echo ""

      - name: Job Summary
        if: always()
        run: |
          echo "## 🎯 User Promotion Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| User Identifier | ${{ github.event.inputs.user_identifier }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.REGION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Job Name | ${{ env.JOB_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Execution | ${{ steps.execute-job.outputs.execution_name }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Script | setup_admin.py |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Useful Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Frontend](https://community-hero-frontend-y4wprv4gea-el.a.run.app/)" >> $GITHUB_STEP_SUMMARY
          echo "- [Cloud Run Jobs](https://console.cloud.google.com/run/jobs?region=${{ env.REGION }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Cloud Logs](https://console.cloud.google.com/logs/query?resource=cloud_run_job)" >> $GITHUB_STEP_SUMMARY