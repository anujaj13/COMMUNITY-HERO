name: Promote User to Admin - Community Hero

on:
  workflow_dispatch:
    inputs:
      user_identifier:
        description: 'Username or User ID to promote to ADMIN'
        required: true
        type: string

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT }}
  REGION: asia-south1
  REGISTRY_REGION: asia-south1
  SERVICE_NAME: community-hero
  IMAGE_NAME: asia-south1-docker.pkg.dev/${{ secrets.GCP_PROJECT }}/community-hero/community-hero
  JOB_NAME: promote-admin-user

jobs:
  promote-admin:
    name: Promote User to Admin via Cloud Run Job
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Create or Update Cloud Run Job
        run: |
          # Check if job exists
          if gcloud run jobs describe ${{ env.JOB_NAME }} \
            --region ${{ env.REGION }} &>/dev/null; then
            echo "✓ Job exists, updating..."
            gcloud run jobs update ${{ env.JOB_NAME }} \
              --image ${{ env.IMAGE_NAME }}:latest \
              --region ${{ env.REGION }} \
              --command python \
              --args "setup_admin.py,${{ github.event.inputs.user_identifier }}" \
              --set-env-vars "DATABASE_URL=sqlite:///./community_hero.db,LOG_LEVEL=INFO" \
              --memory 512Mi \
              --cpu 1 \
              --task-timeout 300 \
              --max-retries 0
          else
            echo "✓ Creating new job..."
            gcloud run jobs create ${{ env.JOB_NAME }} \
              --image ${{ env.IMAGE_NAME }}:latest \
              --region ${{ env.REGION }} \
              --command python \
              --args "setup_admin.py,${{ github.event.inputs.user_identifier }}" \
              --set-env-vars "DATABASE_URL=sqlite:///./community_hero.db,LOG_LEVEL=INFO" \
              --memory 512Mi \
              --cpu 1 \
              --task-timeout 300 \
              --max-retries 0
          fi

      - name: Execute Cloud Run Job
        id: execute-job
        run: |
          echo "🚀 Executing job to promote user to ADMIN..."
          echo "User Identifier: ${{ github.event.inputs.user_identifier }}"
          echo ""
          
          EXECUTION_NAME=$(gcloud run jobs execute ${{ env.JOB_NAME }} \
            --region ${{ env.REGION }} \
            --format='value(metadata.name)' 2>&1)
          
          if [ -z "$EXECUTION_NAME" ]; then
            echo "❌ Failed to execute job"
            exit 1
          fi
          
          echo "execution_name=$EXECUTION_NAME" >> $GITHUB_OUTPUT
          echo "✓ Job execution started: $EXECUTION_NAME"
          echo ""
          echo "⏳ Waiting for job to complete (max 5 minutes)..."
          
          # Wait for job to complete (max 5 minutes = 30 attempts × 10 seconds)
          COMPLETED=false
          for i in {1..30}; do
            sleep 10
            STATUS=$(gcloud run jobs executions describe "$EXECUTION_NAME" \
              --job=${{ env.JOB_NAME }} \
              --region ${{ env.REGION }} \
              --format='value(status.conditions[-1].state)' 2>&1)
            
            if [[ "$STATUS" == "SUCCEEDED" ]]; then
              echo "✅ Job SUCCEEDED"
              COMPLETED=true
              break
            elif [[ "$STATUS" == "FAILED" ]]; then
              echo "❌ Job FAILED"
              COMPLETED=true
              break
            fi
            echo "Waiting... Status: $STATUS (attempt $i/30)"
          done
          
          if [ "$COMPLETED" = false ]; then
            echo "⚠️  Job did not complete within 5 minutes, but continuing to fetch logs..."
          fi

      - name: Get Job Logs
        if: always()
        run: |
          echo "📋 Fetching Job Logs..."
          echo "=========================================="
          
          EXECUTION_NAME="${{ steps.execute-job.outputs.execution_name }}"
          
          if [ -z "$EXECUTION_NAME" ]; then
            echo "❌ No execution name available"
            exit 1
          fi
          
          # Get execution details
          echo "Execution: $EXECUTION_NAME"
          echo ""
          
          # Fetch logs with better error handling
          LOG_OUTPUT=$(gcloud logging read \
            "resource.type=cloud_run_job AND resource.labels.job_name=${{ env.JOB_NAME }} AND resource.labels.execution_name=$EXECUTION_NAME" \
            --region ${{ env.REGION }} \
            --limit 100 \
            --format 'value(textPayload)' \
            --project ${{ env.PROJECT_ID }} 2>&1)
          
          if [ -z "$LOG_OUTPUT" ]; then
            echo "⚠️  No logs found. Trying alternative method..."
            # Alternative: Get logs directly from execution
            gcloud run jobs executions describe "$EXECUTION_NAME" \
              --job=${{ env.JOB_NAME }} \
              --region ${{ env.REGION }} \
              --format='value(status.conditions)' 2>&1
          else
            echo "$LOG_OUTPUT"
          fi
          
          echo "=========================================="

      - name: Success Summary
        if: success()
        run: |
          echo ""
          echo "✅ User promotion job completed!"
          echo ""
          echo "📝 What happens next:"
          echo "  1. Check the logs above to confirm promotion"
          echo "  2. Go to: https://community-hero-frontend-y4wprv4gea-el.a.run.app/"
          echo "  3. Login with your promoted admin account"
          echo ""

      - name: Failure Summary
        if: failure()
        run: |
          echo ""
          echo "❌ Job execution failed!"
          echo ""
          echo "📝 Troubleshooting:"
          echo "  1. Check that the user identifier exists: '${{ github.event.inputs.user_identifier }}'"
          echo "  2. View logs in Cloud Console:"
          echo "     https://console.cloud.google.com/run/jobs/details/${{ env.REGION }}/${{ env.JOB_NAME }}/executions"
          echo "  3. Verify database connection and setup_admin.py script"
          echo ""

      - name: Job Summary
        if: always()
        run: |
          EXECUTION_NAME="${{ steps.execute-job.outputs.execution_name }}"
          
          echo "## 🎯 User Promotion Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| User Identifier | \`${{ github.event.inputs.user_identifier }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Region | ${{ env.REGION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Job Name | ${{ env.JOB_NAME }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Execution ID | \`${EXECUTION_NAME}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Script | setup_admin.py |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔗 Useful Links" >> $GITHUB_STEP_SUMMARY
          echo "- [Cloud Run Jobs Console](https://console.cloud.google.com/run/jobs?region=${{ env.REGION }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Job Execution Details](https://console.cloud.google.com/run/jobs/details/${{ env.REGION }}/${{ env.JOB_NAME }}/executions?region=${{ env.REGION }})" >> $GITHUB_STEP_SUMMARY
          echo "- [Cloud Logs](https://console.cloud.google.com/logs/query?resource=cloud_run_job&project=${{ env.PROJECT_ID }})" >> $GITHUB_STEP_SUMMARY